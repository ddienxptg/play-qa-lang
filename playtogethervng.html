<html lang="vi"><head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        @font-face {
            font-family: 'CookieRun';
            src: url('SRN CookieRun Regular.ttf') format('truetype');
            font-weight: normal;
        }

        body { 
            background-color: #f8f9fa; 
            margin: 0; 
            font-family: 'CookieRun', sans-serif; 
            padding-top: 50px;
            overflow-x: hidden;
        }

        .navbar { 
            height: 50px; 
            background: #fff !important; 
            border-bottom: 1px solid #dee2e6; 
            display: flex; 
            justify-content: center; 
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand { font-weight: bold; color: #555 !important; font-size: 1.1rem; margin: 0 auto; }

        /* --- CHỈNH SỬA KHUNG SLIDE ĐỂ TRÁNH LỘ KHOẢNG TRẮNG --- */
        .img-slide-wrapper { 
            margin: 10px auto 0; /* Căn giữa wrapper */
            width: 100%; 
            max-width: 1140px; 
            position: relative; 
            background-color: #fff; /* Màu nền lấp đầy khi zoom */
            overflow: hidden;
        }

        .swiper { 
            width: 100%; 
            height: auto;
        }

        .swiper-slide { 
            position: relative; 
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        .swiper-slide img { 
            width: 100%; 
            height: auto; 
            display: block;
            object-fit: cover; /* Đảm bảo ảnh luôn lấp đầy slide */
        }

        /* Nút Đi Ngay - Đặt cố định trong từng slide */
        .sudo-btn {
            position: absolute; 
            bottom: 20px; 
            right: 15px; 
            background: #fff; 
            color: #333; 
            padding: 8px 20px; 
            border-radius: 30px; 
            font-weight: 900; 
            font-size: clamp(13px, 3vw, 16px); 
            box-shadow: 0 4px 0 #999; 
            z-index: 20; 
            text-decoration: none !important;
        }

        .slide-counter {
            position: absolute; top: 12px; right: 12px; z-index: 10;
            background: rgba(0,0,0,0.6); color: white; padding: 3px 12px; 
            border-radius: 20px; font-size: 14px;
        }

        /* Danh sách tin tức */
        .list-group-item { padding: 15px 20px; font-size: 15px; color: #333; text-decoration: none; border-bottom: 1px solid #eee; }
        .list-group-item:last-child { border-bottom: none; }
        .list-group-item div { font-weight: bold; margin-bottom: 2px; }
        .old-news { display: none; }
        #btn-more { cursor: pointer; font-weight: bold; text-align: center; color: #888; background: #f9f9f9; width: 100%; }
    </style>
</head>
<body>

                </div><div class="swiper-slide" role="group" aria-label="6 / 6" data-swiper-slide-index="5" style="width: 423px;">
                    <a href="#" style="width: 100%;"><img src="https://ddienxptg.github.io/notice.ptgvng.com/pass_rosegarden_invitation-1.png"></a>
                    
                </div><div class="swiper-slide" role="group" aria-label="1 / 6" data-swiper-slide-index="0" style="width: 423px;">
                    <a href="#" style="width: 100%;"><img src="https://ddienxptg.github.io/notice.ptgvng.com/pet-golem.png"></a>
                    
                </div><div class="swiper-slide swiper-slide-prev" role="group" aria-label="2 / 6" data-swiper-slide-index="1" style="width: 423px;">

                </div></div>
            <div class="slide-counter"><span id="curr">3</span> / <span id="total">6</span></div>
        <span class="swiper-notification" aria-live="assertive" aria-atomic="true"></span><span class="swiper-notification" aria-live="assertive" aria-atomic="true"></span></div>
    </div>

    <main class="container-fluid p-0 pb-5 mt-2" style="max-width: 1140px; margin: 0 auto;">

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            loop: true,
            autoHeight: true,
            speed: 800,
            autoplay: { delay: 3000, disableOnInteraction: false },
            on: {
                init: function () {
                    const realSlides = document.querySelectorAll('.swiper-slide:not(.swiper-slide-duplicate)');
                    document.getElementById('total').innerText = realSlides.length;
                },
                slideChange: function () {
                    document.getElementById('curr').innerText = this.realIndex + 1;
                },
            },
        });

        document.getElementById('btn-more').onclick = function() {
            const box = document.getElementById('old-news-box');
            if (box.style.display === 'block') {
                box.style.display = 'none';
                this.innerText = '▽ More ▽';
            } else {
                box.style.display = 'block';
                this.innerText = '△ Show Less △';
            }
        };
    </script>


</body></html>
